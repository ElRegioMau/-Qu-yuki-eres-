<!doctype html>
<html lang="es-MX">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Test | ¿Qué Yuki eres?</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Nunito:wght@400;600;700;800&family=Poppins:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/themes/pastel.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/pages/test.css" />
  <script defer type="module" src="js/quiz.js"></script>
</head>
<body>
  <div class="bubble-bg" aria-hidden="true"></div>
  <header class="site-header">
    <a class="brand" href="index.html"><span class="brand__icon">🍧</span><span>¿Qué Yuki eres?</span></a>
    <nav class="nav"><a href="index.html">Inicio</a><a href="acerca.html">Acerca</a></nav>
  </header>

  <main class="shell quiz-page">
    <section class="quiz-card card glass-card" aria-live="polite">
      <div class="quiz-topline">
        <span id="questionCounter">Pregunta 1 de 24</span>
        <button class="link-button" id="restartBtn" type="button">Reiniciar</button>
      </div>
      <div class="progress" aria-hidden="true"><div id="progressBar" class="progress__bar"></div></div>
      <p class="eyebrow" id="questionTrait">Elige lo que más se parece a ti</p>
      <h1 id="questionText">Cargando...</h1>
      <div id="answers" class="answers"></div>
      <div class="quiz-controls">
        <button class="btn btn-ghost" id="prevBtn" type="button">Anterior</button>
        <button class="btn btn-primary" id="nextBtn" type="button" disabled>Siguiente</button>
      </div>
    </section>
  </main>

  <footer class="footer shell"><p>Test lúdico inspirado en rasgos de personalidad. No es diagnóstico psicológico.</p></footer>
</body>
</html>
